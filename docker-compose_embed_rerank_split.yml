services:
  vllm-embed:
    image: bolz213/ubuntu-uv:ubuntu22.04-uv0.10.6-vllm0.16.0
    container_name: vllm-embed
    gpus: all
    ipc: host
    command: ["/scripts/start_embed.sh"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8000'"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm-rerank:
    image: bolz213/ubuntu-uv:ubuntu22.04-uv0.10.6-vllm0.16.0
    container_name: vllm-rerank
    gpus: all
    ipc: host
    command: ["/scripts/start_rerank.sh"]
    ports:
      - "8001:8001"
    depends_on:
      vllm-embed:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
